services:
  # 1. Backend (Node.js Web Service)
  - type: web
    name: prompt2page-api
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: prompt2page-builder
          property: host

  # 2. Frontend (React/Vite Static Site)
  - type: web
    name: prompt2page-builder
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: prompt2page-api
          property: host
    # Redirect all routes to index.html for React SPA
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
